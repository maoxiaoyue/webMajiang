server:
  addr: ":8080"
  protocol: "auto" # 啟用 HTTP/3 + HTTP/2 (帶 fallback 到 HTTP/1.1)
  tls:
    enabled: true
    cert_file: "cert.pem"
    key_file: "key.pem"
  read_timeout: 30s
  write_timeout: 30s
  enable_graceful_restart: true

logger:
  level: "debug"
  output: "stdout"
  color_enabled: true

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: "noreply@example.com"

jwt:
  secret: "your_super_secret_key"
